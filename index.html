<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angle & Distance Pro v5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Measure Tool v5</h2>

<input type="file" id="upload">

<div class="toolbar">
  <button onclick="setMode('angle')">Angle</button>
  <button onclick="setMode('distance')">Distance</button>
  <button onclick="setMode('calibration')">Calibrate</button>

  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>

  <button onclick="undo()">Undo</button>
  <button onclick="toggleGrid()">Grid</button>
  <button onclick="toggleSnap()">Snap</button>

  <select onchange="setUnit(this.value)">
    <option value="m">m</option>
    <option value="cm">cm</option>
    <option value="mm">mm</option>
  </select>

  <button onclick="saveImage()">Save</button>
  <button onclick="resetAll()">Reset</button>
</div>

<input type="number" id="realLength" placeholder="Length (m for calibration)" step="0.01">

<canvas id="canvas"></canvas>

<p id="info">Mode: Angle</p>

<script src="https://cdn.jsdelivr.net/npm/fabric@5.3.0/dist/fabric.min.js"></script>
<script src="script.js"></script>

</body>
</html>
